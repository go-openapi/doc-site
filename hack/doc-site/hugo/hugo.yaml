baseURL: https://go-openapi.github.io/doc-site/
title: go-openapi
theme: hugo-relearn
languageCode: en-us

# Enable features
enableEmoji: true
enableGitInfo: true
enableRobotsTXT: true

# Content configuration
contentDir: content

# Output formats
outputs:
  home:
    - html
    - rss
    - print
  section:
    - html
    - rss

# Markup configuration
markup:
  goldmark:
    renderer:
      unsafe: true  # Allow raw HTML in markdown
    parser:
      attribute:
        title: true
        block: true
    renderHooks:
      image:
        useEmbedded: always
  highlight:
    codeFences: true
    guessSyntax: false
    lineNos: false
    lineNumbersInTable: false
    noClasses: true
    style: monokai
    tabWidth: 4

# Taxonomies
taxonomies:
  tag: tags
# Module mounts
module:
  mounts:
    # Custom layouts (override theme if needed)
    - source: layouts
      target: layouts

    # Documentation content
    - source: '../../../docs/doc-site'
      target: content

    # Custom assets (logo, favicon)
    - source: themes/go-openapi-assets
      target: assets

    # Custom static files
    - source: themes/go-openapi-static
      target: static

# Relearn theme parameters
params:
  # Edit links - point to source content
  editURL: 'https://github.com/go-openapi/doc-site/edit/master/docs/doc-site/'
  externalLinkTarget: _blank

  # Repository info
  sourceRepository: 'https://github.com/go-openapi/doc-site'

  # Branding
  author:
    name: 'go-openapi maintainers'
  hideAuthorEmail: true

  # Theme customization
  themeVariant:
    - zen-dark
    - relearn-dark
    - relearn-light
  showVisitedLinks: true
  collapsibleMenu: true
  disableBreadcrumb: false
  disableNextPrev: false
  disableLandingPageButton: true
  titleSeparator: '|'

  # Features
  search:
    disable: false
    index:
      disable: false
    page:
      disable: false
    adapter:
      identifier: lunr
  disableLanguageSwitchingButton: true
  disableInlineCopyToClipBoard: false

  # Menu ordering
  ordersectionsby: 'weight'

  # Custom params (populated by docsite.yaml)
  docsite:
    buildTime: ''

# Menu configuration
menu:
  shortcuts:
    - name: "go-swagger"
      identifier: go-swagger
      url: "https://goswagger.io"
      weight: 5 

    - name: "go-openapi toolkit on github"
      identifier: go-openapi
      url: "https://github.com/go-openapi"
      weight: 20

    - name: "codescan documentation"
      identifier: codescan
      url: "https://go-openapi.github.io/codescan"
      weight: 30

    - name: "runtime documentation"
      identifier: runtime
      url: "https://go-openapi.github.io/runtime"
      weight: 35

    - name: "testify/v2 documentation"
      identifier: testify
      url: "https://go-openapi.github.io/testify"
      weight: 40

    - name: "general documentation"
      identifier: github
      url: "https://github.com/go-openapi/doc-site"
      weight: 45

# Privacy settings
privacy:
  disqus:
    disable: true
  googleAnalytics:
    disable: true
