version: 2
updates:
  - package-ecosystem: "github-actions"
    directories:
      - "**/*"
    schedule:
      interval: "weekly"
      day: "friday"
    open-pull-requests-limit: 2
    allow:
      - dependency-type: all
    groups:
      development-dependencies:
        patterns:
          - '*'
    assignees:
      - fredbi
